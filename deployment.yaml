apiVersion: apps/v1
kind: Deployment
metadata:
  name: conference-webapp
  labels:
    app: conference
spec:
  replicas: 2
  selector:
    matchLabels:
      app: conference
  template:
    metadata:
      labels:
        app: conference
    spec:
      containers:
      - name: web-container
        image: premnath0210/conference-app:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: conference-service
spec:
  type: NodePort
  selector:
    app: conference
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30007
